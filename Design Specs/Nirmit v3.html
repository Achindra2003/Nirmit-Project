<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nirmit — Interior Design for Indian Homes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── Tokens ── */
:root {
  /* Background — cool stone, NOT warm amber */
  --bg:      #ECEAE3;
  --bg-2:    #E4E2DA;
  --bg-3:    #F5F4F0;
  /* Ink */
  --ink:     #111010;
  --ink-2:   #46413B;
  --ink-3:   #857E76;
  /* Lines */
  --line:    #CCCAC0;
  --line-2:  #BCB8AC;
  /* Primary brand — deep forest green */
  --green:   #1B3B2C;
  --green-h: #254D3A;   /* hover */
  --green-lt:#D6E8DE;
  /* Drawing accent — copper, only in SVG drawings */
  --copper:  #B8502A;
  --copper-dk:#8A3C1A;
  /* Leaf for plants/desks in drawings */
  --leaf:    #546E42;
  /* Fonts */
  --fd: 'Spectral', Georgia, serif;
  --fb: 'Outfit', system-ui, sans-serif;
  --fm: 'JetBrains Mono', ui-monospace, monospace;
  --fh: 'Tiro Devanagari Hindi', serif; /* Hindi — logo + carpenter section ONLY */
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family:var(--fb); color:var(--ink); background:var(--bg);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
input, textarea, button, select { font-family:var(--fb); color:inherit; }

/* Paper texture — very subtle, lighter than v2 */
.paper { position:relative; background:var(--bg); }
.paper::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:40px 40px; opacity:0.09;
}
.paper > * { position:relative; z-index:1; }

/* Scrollbar */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:2px; }

/* Range slider */
input[type=range] {
  -webkit-appearance:none; width:100%; height:2px;
  border-radius:1px; background:var(--line); outline:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
  background:var(--green); cursor:pointer;
  border:3px solid var(--bg); box-shadow:0 0 0 1.5px var(--green);
}

/* Eyebrow / label utility */
.eyebrow {
  font-family:var(--fm); font-size:10px; font-weight:500;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-3);
  display:inline-block;
}

/* Animations */
@keyframes appear  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fade    { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes draw    { from{stroke-dashoffset:1200} to{stroke-dashoffset:0} }
@keyframes pulse   { 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes spin    { to{transform:rotate(360deg)} }

.appear   { animation:appear  .5s cubic-bezier(.22,.7,0,1.05) both; }
.appear-2 { animation:appear  .5s cubic-bezier(.22,.7,0,1.05) .1s both; }
.appear-3 { animation:appear  .5s cubic-bezier(.22,.7,0,1.05) .22s both; }
.appear-4 { animation:appear  .5s cubic-bezier(.22,.7,0,1.05) .34s both; }
.appear-5 { animation:appear  .5s cubic-bezier(.22,.7,0,1.05) .46s both; }
.fade     { animation:fade    .3s ease both; }
.slide-up { animation:slideUp .48s cubic-bezier(.22,.7,0,1.05) both; }
.draw-svg { stroke-dasharray:1200; stroke-dashoffset:1200; animation:draw 2.4s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, Fragment } = React;

/* ── Tokens in JS ─────────────────────────────── */
const G = { green:'#1B3B2C', greenH:'#254D3A', copper:'#B8502A', copperDk:'#8A3C1A', leaf:'#546E42', bg:'#ECEAE3', bg3:'#F5F4F0', ink:'#111010', ink2:'#46413B', ink3:'#857E76', line:'#CCCAC0' };

/* ── Shared UI ─────────────────────────────────── */

/* Logo: Sanskrit subtitle ONLY in logo mark */
function Logo({ tone='ink', size='md' }) {
  const fs = { sm:13, md:18, lg:26 }[size];
  const c  = tone==='paper' ? G.bg3 : G.ink;
  const c2 = tone==='paper' ? 'rgba(245,244,240,.55)' : G.ink3;
  return (
    <div style={{ display:'flex', alignItems:'baseline', gap:9, userSelect:'none', cursor:'pointer' }}>
      <span style={{ fontFamily:'var(--fd)', fontSize:fs*1.08, fontWeight:500, letterSpacing:'0.015em', color:c }}>Nirmit</span>
      <span style={{ fontFamily:'var(--fh)', fontSize:fs*0.68, color:c2 }}>निर्मित</span>
    </div>
  );
}

/* Buttons — clear affordance */
function FilledBtn({ children, onClick, disabled, full, style:s={} }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={disabled?undefined:onClick} disabled={disabled}
      onMouseEnter={()=>!disabled&&setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{
        display:'inline-flex', alignItems:'center', gap:8,
        background: hov ? G.greenH : G.green,
        color: G.bg3, border:'none', cursor: disabled?'default':'pointer',
        padding:'13px 28px', fontFamily:'var(--fb)', fontSize:12,
        fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase',
        opacity: disabled?0.3:1, transition:'background .2s ease',
        width: full?'100%':undefined, justifyContent: full?'center':undefined,
        ...s,
      }}>{children}</button>
  );
}

function OutlineBtn({ children, onClick, full, style:s={} }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        display:'inline-flex', alignItems:'center', gap:8,
        background: hov ? G.green : 'transparent',
        color: hov ? G.bg3 : G.green,
        border:`1.5px solid ${G.green}`, cursor:'pointer',
        padding:'11px 26px', fontFamily:'var(--fb)', fontSize:12,
        fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase',
        transition:'all .2s ease', width:full?'100%':undefined,
        justifyContent:full?'center':undefined, ...s,
      }}>{children}</button>
  );
}

function GhostBtn({ children, onClick, style:s={} }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        display:'inline-flex', alignItems:'center', gap:6,
        background:'transparent', color: hov?G.ink:G.ink3,
        border:`1px solid ${hov?G.ink:G.line}`, cursor:'pointer',
        padding:'10px 20px', fontFamily:'var(--fb)', fontSize:11,
        fontWeight:500, letterSpacing:'0.06em', textTransform:'uppercase',
        transition:'all .2s ease', ...s,
      }}>{children}</button>
  );
}

/* Top navigation bar */
function TopBar({ active, onNav }) {
  const tabs = [
    ['cover','I','The Studio'],
    ['consult','II','Consultation'],
    ['draft','III','Drafting'],
    ['reveal','IV','The Reveal'],
    ['studio','V','Workspace'],
    ['handoff','VI','Handoff'],
  ];
  return (
    <div style={{
      height:58, padding:'0 44px', display:'flex', justifyContent:'space-between',
      alignItems:'center', flexShrink:0, background:G.bg,
      borderBottom:`1px solid ${G.line}`, position:'relative', zIndex:10,
    }}>
      <div onClick={()=>onNav('cover')}><Logo size="sm"/></div>
      <div style={{ display:'flex', gap:6, alignItems:'center' }}>
        {tabs.map(([id,n,label]) => {
          const isAct = active===id;
          return (
            <div key={id} onClick={()=>onNav(id)}
              style={{
                display:'flex', alignItems:'baseline', gap:5, cursor:'pointer',
                padding:'6px 12px', transition:'all .2s',
                background: isAct ? G.green : 'transparent',
                borderRadius: 2,
              }}>
              <span style={{ fontFamily:'var(--fm)', fontSize:9, color: isAct?'rgba(245,244,240,.6)':G.ink3, letterSpacing:'0.12em' }}>{n}</span>
              <span style={{ fontFamily:'var(--fd)', fontStyle:'italic', fontSize:13, fontWeight:500, color: isAct?G.bg3:G.ink3, transition:'color .2s' }}>{label}</span>
            </div>
          );
        })}
      </div>
      <span className="eyebrow" style={{ fontSize:9.5 }}>Mumbai · Nº 0042</span>
    </div>
  );
}

/* ── Floor Plan SVG ────────────────────────────── */
function FloorPlan({ S=24, animStage=99, labels=true }) {
  const RW=12*S, RH=14*S, P=48, VW=RW+P*2, VH=RH+P*2;
  const show = i => animStage>=i ? {opacity:1,transition:'opacity .8s ease'} : {opacity:0};
  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${VW} ${VH}`} preserveAspectRatio="xMidYMid meet" style={{overflow:'visible'}}>
      <defs>
        <pattern id="fp-hatch"  x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke={G.ink} strokeWidth="0.55" opacity="0.45"/></pattern>
        <pattern id="fp-copper" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke={G.copper} strokeWidth="0.6" opacity="0.5"/></pattern>
        <pattern id="fp-green"  x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke={G.leaf} strokeWidth="0.6" opacity="0.55"/></pattern>
      </defs>
      <g transform={`translate(${P},${P})`}>
        {/* Dimension lines */}
        <g style={show(1)}>
          <line x1={0} y1={-24} x2={RW} y2={-24} stroke={G.ink3} strokeWidth="0.5"/>
          <line x1={0} y1={-28} x2={0} y2={-20} stroke={G.ink3} strokeWidth="0.5"/>
          <line x1={RW} y1={-28} x2={RW} y2={-20} stroke={G.ink3} strokeWidth="0.5"/>
          <text x={RW/2} y={-30} textAnchor="middle" fontFamily="var(--fm)" fontSize="9" fill={G.ink3} letterSpacing="0.1em">12'–0"</text>
          <line x1={-24} y1={0} x2={-24} y2={RH} stroke={G.ink3} strokeWidth="0.5"/>
          <line x1={-28} y1={0} x2={-20} y2={0} stroke={G.ink3} strokeWidth="0.5"/>
          <line x1={-28} y1={RH} x2={-20} y2={RH} stroke={G.ink3} strokeWidth="0.5"/>
          <text x={-28} y={RH/2} textAnchor="middle" fontFamily="var(--fm)" fontSize="9" fill={G.ink3} transform={`rotate(-90,-28,${RH/2})`} letterSpacing="0.1em">14'–0"</text>
        </g>

        {/* Wall outline — draws itself on draft screen */}
        {animStage < 99
          ? <rect width={RW} height={RH} fill="none" stroke={G.ink} strokeWidth="3" className="draw-svg" style={{animationDelay:'.1s'}}/>
          : <rect width={RW} height={RH} fill="none" stroke={G.ink} strokeWidth="3"/>}

        {/* Wall fill */}
        <g style={show(1)}>
          <rect x={0} y={0} width={RW} height={3} fill={G.ink} opacity="0.9"/>
          <rect x={0} y={RH-3} width={RW} height={3} fill={G.ink} opacity="0.9"/>
          <rect x={0} y={0} width={3} height={RH} fill={G.ink} opacity="0.9"/>
          <rect x={RW-3} y={0} width={3} height={RH} fill={G.ink} opacity="0.9"/>
        </g>

        {/* Window — N wall */}
        <g style={show(1)}>
          <rect x={80} y={-3} width={100} height={6} fill={G.bg} stroke={G.ink} strokeWidth="1"/>
          <line x1={80} y1={0} x2={180} y2={0} stroke={G.ink} strokeWidth="0.5"/>
          {labels&&<text x={130} y={-10} textAnchor="middle" fontFamily="var(--fm)" fontSize="8" fill={G.ink3} letterSpacing="0.1em">WINDOW 4'–0"</text>}
        </g>

        {/* Door — S wall */}
        <g style={show(1)}>
          <rect x={48} y={RH-3} width={48} height={6} fill={G.bg} stroke={G.ink} strokeWidth="1"/>
          <path d={`M 48 ${RH} A 48 48 0 0 0 96 ${RH-48}`} fill="none" stroke={G.ink3} strokeWidth="0.7" strokeDasharray="2 3"/>
          <line x1={48} y1={RH} x2={48} y2={RH-48} stroke={G.ink3} strokeWidth="0.8"/>
          {labels&&<text x={72} y={RH+16} textAnchor="middle" fontFamily="var(--fm)" fontSize="8" fill={G.ink3} letterSpacing="0.1em">DOOR 2'–0"</text>}
        </g>

        {/* TV Unit */}
        <g style={show(2)}>
          <rect x={40} y={6} width={130} height={26} fill="url(#fp-hatch)" stroke={G.ink} strokeWidth="1"/>
          <text x={105} y={23} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="11" fill={G.ink}>TV unit</text>
        </g>

        {/* Mandir — NE, copper */}
        <g style={show(4)}>
          <rect x={RW-54} y={6} width={46} height={46} fill="url(#fp-copper)" stroke={G.copper} strokeWidth="1.5"/>
          <text x={RW-31} y={28} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="11" fill={G.copperDk}>Mandir</text>
          <text x={RW-31} y={42} textAnchor="middle" fontFamily="var(--fh)" fontSize="9" fill={G.copperDk}>मन्दिर</text>
        </g>

        {/* Bookshelf — W */}
        <g style={show(2)}>
          <rect x={5} y={84} width={20} height={110} fill="url(#fp-hatch)" stroke={G.ink} strokeWidth="1"/>
          <text x={15} y={140} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="9" fill={G.ink} transform="rotate(-90,15,140)">Bookshelf</text>
        </g>

        {/* WFH Desk — E */}
        <g style={show(3)}>
          <rect x={RW-44} y={116} width={38} height={84} fill="url(#fp-green)" stroke={G.leaf} strokeWidth="1"/>
          <text x={RW-25} y={162} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="10" fill={G.leaf}>Desk</text>
          <circle cx={RW-78} cy={158} r="13" fill="none" stroke={G.ink3} strokeWidth="0.7" strokeDasharray="2 2"/>
        </g>

        {/* Sofa */}
        <g style={show(2)}>
          <rect x={18} y={RH-106} width={210} height={62} rx="5" fill="url(#fp-hatch)" stroke={G.ink} strokeWidth="1.2"/>
          <line x1={88} y1={RH-106} x2={88} y2={RH-44} stroke={G.ink} strokeWidth="0.6"/>
          <line x1={158} y1={RH-106} x2={158} y2={RH-44} stroke={G.ink} strokeWidth="0.6"/>
          <text x={123} y={RH-70} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="13" fill={G.ink}>Sofa · 9'–0"</text>
        </g>

        {/* Coffee table */}
        <g style={show(3)}>
          <rect x={72} y={RH-172} width={100} height={46} rx="3" fill={G.bg2||'#E4E2DA'} stroke={G.ink} strokeWidth="1"/>
          <text x={122} y={RH-144} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="10" fill={G.ink2}>Coffee table</text>
        </g>

        {/* Plant — SW */}
        <g style={show(4)}>
          <circle cx={18} cy={RH-20} r="13" fill="none" stroke={G.leaf} strokeWidth="1.2"/>
          <circle cx={18} cy={RH-20} r="8" fill="none" stroke={G.leaf} strokeWidth="0.7" strokeDasharray="1 2"/>
        </g>

        {/* North arrow */}
        <g transform={`translate(${RW+18},-22)`}>
          <circle cx="0" cy="0" r="14" fill={G.bg} stroke={G.ink} strokeWidth="0.8"/>
          <polygon points="0,-9 3,3 0,0 -3,3" fill={G.ink}/>
          <text x="0" y="-11" textAnchor="middle" fontFamily="var(--fm)" fontSize="7" fill={G.ink} fontWeight="600">N</text>
        </g>
      </g>

      {/* Title block */}
      <g transform={`translate(${VW-155},${VH-40})`}>
        <line x1="0" y1="0" x2="130" y2="0" stroke={G.ink3} strokeWidth="0.5"/>
        <text x="0" y="13" fontFamily="var(--fm)" fontSize="8.5" fill={G.ink3} letterSpacing="0.13em">PLAN · LIVING ROOM</text>
        <text x="0" y="25" fontFamily="var(--fm)" fontSize="8.5" fill={G.ink3} letterSpacing="0.13em">SCALE 1:48 · NM-0042-A</text>
      </g>
    </svg>
  );
}

/* ── II. CONSULTATION ─────────────────────────── */
function ConsultScreen({ onNav, brief, setBrief }) {
  const [page, setPage] = useState(0);
  const PAGES = [
    { title:'What feeling?', sub:'Not the style — the feeling. This drives everything else.', kind:'vibe' },
    { title:'Which room, how big?', sub:'A rough sense is enough. You can refine it in the planner.', kind:'room' },
    { title:'Who lives here?', sub:'Tell us in plain language. The more you share, the more personal the design.', kind:'who' },
    { title:'Budget and city?', sub:'For furniture and finishing. Installation costs are separate.', kind:'budget' },
  ];
  const ok = [!!brief.vibe, !!(brief.room&&brief.size), !!(brief.who&&brief.who.trim().length>4), !!brief.city];
  const P = PAGES[page];
  const next = () => page<3 ? setPage(p=>p+1) : onNav('draft');
  const prev = () => page>0 ? setPage(p=>p-1) : onNav('cover');

  const trail = [
    brief.vibe ? VIBES.find(v=>v.id===brief.vibe)?.name : null,
    brief.room ? `${ROOMS.find(r=>r[0]===brief.room)?.[1]} · ${SIZES.find(s=>s.id===brief.size)?.en||''}` : null,
    brief.who ? brief.who.slice(0,42)+'…' : null,
    brief.city ? `${fmt(brief.budget)} · ${brief.city}` : null,
  ].filter(Boolean);

  return (
    <div className="paper" style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
      <TopBar active="consult" onNav={onNav}/>

      {/* Progress bar */}
      <div style={{ height:2, background:G.line, flexShrink:0 }}>
        <div style={{ height:2, background:G.green, width:`${((page+(ok[page]?1:0))/4)*100}%`, transition:'width .4s ease' }}/>
      </div>

      <div style={{ flex:1, display:'grid', gridTemplateColumns:'2fr 3fr', minHeight:0, overflow:'hidden' }}>

        {/* Left — question */}
        <div style={{ padding:'60px 40px 40px 56px', display:'flex', flexDirection:'column', justifyContent:'space-between', borderRight:`1px solid ${G.line}`, overflow:'hidden' }}>
          <div>
            <div className="appear" style={{ marginBottom:24 }}>
              <span className="eyebrow">Page {String(page+1).padStart(2,'0')} of 04</span>
            </div>
            <h2 key={`q${page}`} className="slide-up" style={{ fontFamily:'var(--fd)', fontSize:'clamp(36px,4vw,58px)', fontWeight:500, lineHeight:1.05, letterSpacing:'-0.018em', marginBottom:12 }}>
              {P.title.split(',').map((pt,i,arr)=>(
                <Fragment key={i}>{i>0&&', '}<span style={i===arr.length-1?{fontStyle:'italic',color:G.green}:{}}>{pt}</span></Fragment>
              ))}
            </h2>
            <p className="appear-3" style={{ fontFamily:'var(--fd)', fontStyle:'italic', fontSize:16, color:G.ink2, lineHeight:1.5, maxWidth:'32ch' }}>{P.sub}</p>
          </div>

          {/* Trail */}
          {trail.length>0 && (
            <div className="appear-4" style={{ display:'flex', flexDirection:'column', gap:8 }}>
              <span className="eyebrow">So far</span>
              <div style={{ display:'flex', flexDirection:'column', gap:6, marginTop:8 }}>
                {trail.map((t,i) => (
                  <div key={i} style={{ display:'flex', alignItems:'baseline', gap:10 }}>
                    <span className="eyebrow" style={{ minWidth:14, fontSize:9 }}>{String(i+1).padStart(2,'0')}</span>
                    <span style={{ fontFamily:'var(--fd)', fontStyle:'italic', fontSize:14, color:i===page?G.green:G.ink }}>{t}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Right — answer + nav */}
        <div style={{ display:'flex', flexDirection:'column', overflow:'hidden' }}>
          <div key={`a${page}`} style={{ flex:1, overflowY:'auto', padding:'40px 56px 20px', animation:'slideUp .48s cubic-bezier(.22,.7,0,1.05) .12s both' }}>
            {P.kind==='vibe'   && <VibeAnswer   brief={brief} setBrief={setBrief}/>}
            {P.kind==='room'   && <RoomAnswer   brief={brief} setBrief={setBrief}/>}
            {P.kind==='who'    && <WhoAnswer    brief={brief} setBrief={setBrief}/>}
            {P.kind==='budget' && <BudgetAnswer brief={brief} setBrief={setBrief}/>}
          </div>

          {/* Nav footer */}
          <div style={{ padding:'16px 56px 32px', borderTop:`1px solid ${G.line}`, flexShrink:0, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <GhostBtn onClick={prev}>
              ← {page===0?'Cover':'Back'}
            </GhostBtn>
            <FilledBtn onClick={ok[page]?next:undefined} disabled={!ok[page]}>
              {page<3 ? 'Continue →' : 'Begin drafting →'}
            </FilledBtn>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── III. DRAFTING ────────────────────────────── */
function DraftScreen({ onNav }) {
  const [stage, setStage] = useState(0);
  const [noteIdx, setNoteIdx] = useState(0);
  const cbRef = useRef(onNav);
  cbRef.current = onNav;
  useEffect(() => {
    let s=0;
    const iv = setInterval(()=>{ s++; if(s>=GEN_STAGES.length+1){ clearInterval(iv); setTimeout(()=>cbRef.current('reveal'),1200); } else setStage(s); }, 2000);
    return ()=>clearInterval(iv);
  }, []);
  useEffect(()=>{ const iv=setInterval(()=>setNoteIdx(n=>(n+1)%GEN_NOTES.length),2600); return()=>clearInterval(iv); },[]);

  return (
    <div className="paper" style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
      <TopBar active="draft" onNav={onNav}/>
      <div style={{ flex:1, display:'grid', gridTemplateColumns:'1fr 320px', minHeight:0 }}>

        {/* Drawing canvas */}
        <div style={{ padding:'32px 24px 32px 48px', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
          <div style={{ width:'100%', height:'100%', maxHeight:540 }}>
            <FloorPlan S={28} animStage={stage}/>
          </div>
        </div>

        {/* Narration panel */}
        <div style={{ borderLeft:`1px solid ${G.line}`, padding:'48px 36px 40px', display:'flex', flexDirection:'column', justifyContent:'space-between' }}>
          <div>
            <span className="eyebrow">Architect's notes</span>
            <div style={{ fontFamily:'var(--fd)', fontStyle:'italic', fontSize:'clamp(24px,2.2vw,34px)', fontWeight:500, lineHeight:1.1, color:G.ink, marginTop:12, minHeight:82 }}>
              {stage===0 && 'Beginning to draw…'}
              {stage>0 && stage<=GEN_STAGES.length && GEN_STAGES[stage-1]}
              {stage>GEN_STAGES.length && 'Three rooms are ready.'}
            </div>
            <div key={noteIdx} className="fade" style={{ fontFamily:'var(--fd)', fontStyle:'italic', fontSize:14, color:G.ink3, marginTop:12, lineHeight:1.5, minHeight:44 }}>

            </div>
          </div>

          {/* Steps */}
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <span className="eyebrow">Working steps</span>

              return (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <span style={{ fontFamily:'var(--fm)', fontSize:9.5, color:done?G.green:cur?G.ink:G.ink3, minWidth:22 }}>{String(i+1).padStart(2,'0')}</span>

            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── App ─────────────────────────────────────── */
function App() {
  const [screen, setScreen] = useState('cover');
  const [brief, setBrief] = useState({ vibe:'gather', room:'living', size:'standard', who:'', chips:[], budget:300000, city:null });
  const onNav = useCallback(s=>setScreen(s),[]);
  return (
    <div style={{ position:'fixed', inset:0, overflow:'hidden' }}>
      <div key={screen} style={{ position:'absolute', inset:0, animation:'fade .3s ease' }}>
        {screen==='cover'   && <CoverScreen   onNav={onNav}/>}
        {screen==='consult' && <ConsultScreen onNav={onNav} brief={brief} setBrief={setBrief}/>}
        {screen==='draft'   && <DraftScreen   onNav={onNav}/>}
        {screen==='reveal'  && <RevealScreen  onNav={onNav}/>}
        {screen==='studio'  && <StudioScreen  onNav={onNav}/>}
        {screen==='handoff' && <HandoffScreen onNav={onNav}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
