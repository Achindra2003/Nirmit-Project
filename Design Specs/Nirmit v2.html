<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nirmit — निर्मित</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Tiro+Devanagari+Hindi:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  --paper:    #F2EBDD;
  --paper-2:  #EAE2D0;
  --paper-3:  #F8F3E8;
  --ink:      #1F1B16;
  --ink-2:    #5D544A;
  --ink-3:    #8C8170;
  --line:     #D9CFB9;
  --line-2:   #C8BFA8;
  --terra:    #C2502E;
  --terra-dk: #9E3A1B;
  --walnut:   #5B3B26;
  --leaf:     #6B7A4A;

  --fd: 'Cormorant Garamond', Georgia, serif;
  --fh: 'Tiro Devanagari Hindi', serif;
  --fb: 'DM Sans', system-ui, sans-serif;
  --fm: 'JetBrains Mono', ui-monospace, monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing: border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family: var(--fb); color: var(--ink); background: var(--paper);
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
}
input, textarea, button, select { font-family: var(--fb); color: inherit; }

/* Paper texture — subtle grid + vignette */
.paper {
  position: relative;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(31,27,22,0.025), transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(31,27,22,0.04), transparent 65%),
    var(--paper);
}
.paper::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 32px 32px;
  opacity: 0.18;
}
.paper > * { position: relative; }

::-webkit-scrollbar { width: 5px; height:5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }

/* Type utilities */
.eyebrow {
  font-family: var(--fm); font-size: 11px; font-weight: 500;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3);
}
.serif-italic { font-family: var(--fd); font-style: italic; font-weight: 400; }

/* Range slider */
input[type=range] {
  -webkit-appearance: none; width: 100%; height: 1px;
  background: var(--ink); outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--terra); cursor: pointer;
  border: 3px solid var(--paper); box-shadow: 0 0 0 1px var(--terra);
}

/* Animations */
@keyframes appear { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }
@keyframes fade   { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }
@keyframes draw   { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
@keyframes pulse  { 0%,100% { opacity:.55; } 50% { opacity:1; } }
@keyframes blink  { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
@keyframes spin   { to { transform: rotate(360deg); } }

.appear   { animation: appear .55s cubic-bezier(.22,.7,0,1.05) both; }
.appear-2 { animation: appear .55s cubic-bezier(.22,.7,0,1.05) .1s both; }
.appear-3 { animation: appear .55s cubic-bezier(.22,.7,0,1.05) .22s both; }
.appear-4 { animation: appear .55s cubic-bezier(.22,.7,0,1.05) .34s both; }
.appear-5 { animation: appear .55s cubic-bezier(.22,.7,0,1.05) .46s both; }
.fade     { animation: fade .35s ease both; }
.slide-up { animation: slideUp .5s cubic-bezier(.22,.7,0,1.05) both; }

.draw-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 2.4s ease forwards; }

/* Underline-link */
.lnk {
  position: relative; cursor: pointer; display: inline-flex; align-items: baseline; gap: 8px;
  color: var(--ink); text-decoration: none; padding-bottom: 3px;
  border-bottom: 1px solid var(--ink); transition: color .25s ease, border-color .25s ease;
}
.lnk:hover { color: var(--terra); border-color: var(--terra); }
.lnk-arrow { display:inline-block; transition: transform .3s ease; }
.lnk:hover .lnk-arrow { transform: translateX(4px); }

/* No global "styles" obj — we use inline objects throughout for clarity */
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, Fragment } = React;

/* ─────────────────────────────────────────────────────────────
   SHARED UI
   ───────────────────────────────────────────────────────────── */

function Logo({ tone='ink', size='md' }) {
  const fs = { sm:14, md:18, lg:26 }[size];
  const c = tone === 'paper' ? 'var(--paper)' : 'var(--ink)';
  const c2 = tone === 'paper' ? 'rgba(242,235,221,.6)' : 'var(--ink-3)';
  return (
    <div style={{ display:'flex', alignItems:'baseline', gap:10, userSelect:'none' }}>
      <span style={{ fontFamily:'var(--fd)', fontSize:fs*1.1, fontWeight:500, letterSpacing:'0.02em', color:c }}>Nirmit</span>
      <span style={{ fontFamily:'var(--fh)', fontSize:fs*0.78, color:c2, letterSpacing:'0.04em' }}>निर्मित</span>
    </div>
  );
}

function Eyebrow({ children, color }) {
  return <span className="eyebrow" style={{ color: color || 'var(--ink-3)' }}>{children}</span>;
}

function HiPair({ en, hi, sz=14, hsz, weight=400, color='var(--ink)' }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'baseline', gap:8 }}>
      <span style={{ fontSize:sz, fontWeight:weight, color }}>{en}</span>
      {hi && <span style={{ fontFamily:'var(--fh)', fontSize: hsz || sz*0.78, color:'var(--ink-3)' }}>{hi}</span>}
    </span>
  );
}

function PrimaryLink({ children, onClick, big }) {
  return (
    <a className="lnk" onClick={onClick} style={{
      fontFamily:'var(--fd)', fontStyle:'italic', fontWeight:500,
      fontSize: big ? 22 : 17, letterSpacing:'0.005em',
    }}>
      {children}
      <span className="lnk-arrow">→</span>
    </a>
  );
}

function GhostBtn({ children, onClick, style:s={} }) {
  return (
    <button onClick={onClick} style={{
      background:'transparent', border:'1px solid var(--ink)', cursor:'pointer',
      padding:'12px 28px', fontFamily:'var(--fb)', fontSize:13, fontWeight:500,
      letterSpacing:'0.04em', color:'var(--ink)', textTransform:'uppercase',
      transition:'all .25s ease', ...s,
    }}
    onMouseEnter={e=>{ e.currentTarget.style.background='var(--ink)'; e.currentTarget.style.color='var(--paper)'; }}
    onMouseLeave={e=>{ e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--ink)'; }}
    >{children}</button>
  );
}

function FilledBtn({ children, onClick, disabled, style:s={} }) {
  return (
    <button onClick={disabled?undefined:onClick} disabled={disabled} style={{
      background:'var(--ink)', color:'var(--paper)', border:'none', cursor:disabled?'default':'pointer',
      padding:'14px 32px', fontFamily:'var(--fb)', fontSize:13, fontWeight:500,
      letterSpacing:'0.04em', textTransform:'uppercase',
      opacity:disabled?.32:1, transition:'all .25s ease', ...s,
    }}
    onMouseEnter={e=>{ if(!disabled){ e.currentTarget.style.background='var(--terra)'; }}}
    onMouseLeave={e=>{ if(!disabled){ e.currentTarget.style.background='var(--ink)'; }}}
    >{children}</button>
  );
}

/* Top chrome — used on most screens */
function TopBar({ active, onNav, dark, light }) {
  const items = [
    ['cover','I.','The Studio'],
    ['consult','II.','Consultation'],
    ['draft','III.','Drafting'],
    ['reveal','IV.','The Reveal'],
    ['studio','V.','The Workspace'],
    ['handoff','VI.','The Handoff'],
  ];
  const tone = dark ? 'paper' : 'ink';
  const inkC = dark ? 'var(--paper)' : 'var(--ink)';
  const dimC = dark ? 'rgba(242,235,221,.5)' : 'var(--ink-3)';
  return (
    <div style={{ height:60, padding:'0 40px', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0, borderBottom:`1px solid ${dark?'rgba(242,235,221,.12)':'var(--line)'}` }}>
      <div onClick={()=>onNav('cover')} style={{ cursor:'pointer' }}><Logo tone={tone} size="sm"/></div>
      <div style={{ display:'flex', gap:28, alignItems:'center' }}>
        {items.map(([id,n,label]) => (
          <div key={id} onClick={()=>onNav(id)} style={{ cursor:'pointer', display:'flex', alignItems:'baseline', gap:5 }}>
            <span className="eyebrow" style={{ color: active===id ? 'var(--terra)' : dimC, fontSize:9.5 }}>{n}</span>
            <span style={{ fontFamily:'var(--fd)', fontStyle:'italic', fontSize:14, color: active===id ? inkC : dimC, fontWeight:500 }}>{label}</span>
          </div>
        ))}
      </div>
      <div className="eyebrow" style={{ color: dimC }}>Mumbai · No. 0042</div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────
   ARCHITECTURAL FLOOR PLAN COMPONENT (shared)
   ───────────────────────────────────────────────────────────── */

function FloorPlan({ S=24, drawAnim=false, stage=99, showAnnotations=true, accent='var(--terra)' }) {
  // Room: 12 × 14 ft.  S = px per foot.
  const RW = 12*S, RH = 14*S, PAD = 56;
  const VW = RW + PAD*2, VH = RH + PAD*2;

  // helper to fade in based on stage progress (used for animated drafting)
  const showAt = step => drawAnim ? (stage >= step ? { opacity:1, transition:'opacity .8s ease' } : { opacity:0 }) : { opacity:1 };

  return (
    <svg width="100%" height="100%" viewBox={`0 0 ${VW} ${VH}`} preserveAspectRatio="xMidYMid meet" style={{ overflow:'visible' }}>
      <defs>
        <pattern id="hatch" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="6" stroke="var(--ink)" strokeWidth="0.6" opacity="0.55"/>
        </pattern>
        <pattern id="hatchTerra" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="5" stroke="var(--terra)" strokeWidth="0.7" opacity="0.55"/>
        </pattern>
        <pattern id="hatchLeaf" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="5" stroke="var(--leaf)" strokeWidth="0.7" opacity="0.7"/>
        </pattern>
      </defs>

      <g transform={`translate(${PAD},${PAD})`}>
        {/* Outer dimension lines */}
        <g style={showAt(1)}>
          <line x1={0} y1={-26} x2={RW} y2={-26} stroke="var(--ink-3)" strokeWidth="0.5"/>
          <line x1={0} y1={-30} x2={0} y2={-22} stroke="var(--ink-3)" strokeWidth="0.5"/>
          <line x1={RW} y1={-30} x2={RW} y2={-22} stroke="var(--ink-3)" strokeWidth="0.5"/>
          <text x={RW/2} y={-32} textAnchor="middle" fontFamily="var(--fm)" fontSize="9" fill="var(--ink-2)" letterSpacing="0.1em">12'-0"</text>

          <line x1={-26} y1={0} x2={-26} y2={RH} stroke="var(--ink-3)" strokeWidth="0.5"/>
          <line x1={-30} y1={0} x2={-22} y2={0} stroke="var(--ink-3)" strokeWidth="0.5"/>
          <line x1={-30} y1={RH} x2={-22} y2={RH} stroke="var(--ink-3)" strokeWidth="0.5"/>
          <text x={-30} y={RH/2} textAnchor="middle" fontFamily="var(--fm)" fontSize="9" fill="var(--ink-2)" letterSpacing="0.1em" transform={`rotate(-90, -30, ${RH/2})`}>14'-0"</text>
        </g>

        {/* Walls — drawn first */}
        {drawAnim ? (
          <rect width={RW} height={RH} fill="none" stroke="var(--ink)" strokeWidth="3"
            className="draw-line"
            style={{ animationDelay:'.1s' }}/>
        ) : (
          <rect width={RW} height={RH} fill="none" stroke="var(--ink)" strokeWidth="3"/>
        )}

        {/* Wall thickness — inside hatching (load with walls) */}
        <g style={showAt(1)}>
          <rect x="0" y="0" width={RW} height="3" fill="var(--ink)" opacity="0.85"/>
          <rect x="0" y={RH-3} width={RW} height="3" fill="var(--ink)" opacity="0.85"/>
          <rect x="0" y="0" width="3" height={RH} fill="var(--ink)" opacity="0.85"/>
          <rect x={RW-3} y="0" width="3" height={RH} fill="var(--ink)" opacity="0.85"/>
        </g>

        {/* Window — north wall */}
        <g style={showAt(1)}>
          <rect x={84} y={-3} width={96} height={6} fill="var(--paper)" stroke="var(--ink)" strokeWidth="1"/>
          <line x1={84} y1={0} x2={180} y2={0} stroke="var(--ink)" strokeWidth="0.5"/>
          {showAnnotations && <text x={132} y={-12} textAnchor="middle" fontFamily="var(--fm)" fontSize="8" fill="var(--ink-3)" letterSpacing="0.1em">WINDOW · 4'-0"</text>}
        </g>

        {/* Door — south wall, swings inward */}
        <g style={showAt(1)}>
          <rect x={48} y={RH-3} width={48} height={6} fill="var(--paper)" stroke="var(--ink)" strokeWidth="1"/>
          <path d={`M 48 ${RH-3} A 48 48 0 0 0 96 ${RH-51}`} fill="none" stroke="var(--ink-3)" strokeWidth="0.6" strokeDasharray="2 3"/>
          <line x1={48} y1={RH-3} x2={48} y2={RH-51} stroke="var(--ink-3)" strokeWidth="0.8"/>
          {showAnnotations && <text x={72} y={RH+18} textAnchor="middle" fontFamily="var(--fm)" fontSize="8" fill="var(--ink-3)" letterSpacing="0.1em">DOOR · 2'-0"</text>}
        </g>

        {/* Furniture group */}
        {/* TV Unit — north wall */}
        <g style={showAt(2)}>
          <rect x={42} y={6} width={120} height={26} fill="url(#hatch)" stroke="var(--ink)" strokeWidth="1"/>
          <text x={102} y={23} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="11" fill="var(--ink)">TV unit</text>
        </g>

        {/* Mandir — NE corner */}
        <g style={showAt(4)}>
          <rect x={RW-58} y={6} width={50} height={50} fill="url(#hatchTerra)" stroke="var(--terra)" strokeWidth="1.4"/>
          <text x={RW-33} y={32} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="11" fill="var(--terra-dk)">Mandir</text>
          <text x={RW-33} y={45} textAnchor="middle" fontFamily="var(--fh)" fontSize="9" fill="var(--terra-dk)">मन्दिर</text>
          {/* compass blip */}
          <circle cx={RW-12} cy={12} r="1.5" fill="var(--terra)"/>
        </g>

        {/* Bookshelf — west wall */}
        <g style={showAt(2)}>
          <rect x={6} y={88} width={20} height={120} fill="url(#hatch)" stroke="var(--ink)" strokeWidth="1"/>
          <text x={16} y={150} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="10" fill="var(--ink)" transform={`rotate(-90, 16, 150)`}>Books</text>
        </g>

        {/* WFH desk — east wall */}
        <g style={showAt(3)}>
          <rect x={RW-44} y={120} width={38} height={88} fill="url(#hatchLeaf)" stroke="var(--leaf)" strokeWidth="1"/>
          <text x={RW-25} y={168} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="10" fill="var(--leaf)">Desk</text>
          {/* chair */}
          <circle cx={RW-72} cy={164} r="14" fill="none" stroke="var(--ink-3)" strokeWidth="0.8" strokeDasharray="2 2"/>
        </g>

        {/* Sofa — south, big */}
        <g style={showAt(2)}>
          <rect x={20} y={RH-110} width={210} height={64} rx="6" fill="url(#hatch)" stroke="var(--ink)" strokeWidth="1.2"/>
          {/* cushion divisions */}
          <line x1={90} y1={RH-110} x2={90} y2={RH-46} stroke="var(--ink)" strokeWidth="0.6"/>
          <line x1={160} y1={RH-110} x2={160} y2={RH-46} stroke="var(--ink)" strokeWidth="0.6"/>
          <text x={125} y={RH-72} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="13" fill="var(--ink)">Sofa · 9'-0"</text>
        </g>

        {/* Coffee table */}
        <g style={showAt(3)}>
          <rect x={75} y={RH-178} width={100} height={48} rx="4" fill="var(--paper-2)" stroke="var(--ink)" strokeWidth="1"/>
          <text x={125} y={RH-149} textAnchor="middle" fontFamily="var(--fd)" fontStyle="italic" fontSize="10" fill="var(--ink-2)">Coffee</text>
        </g>

        {/* Plant — SW */}
        <g style={showAt(4)}>
          <circle cx={20} cy={RH-22} r="14" fill="none" stroke="var(--leaf)" strokeWidth="1.2"/>
          <circle cx={20} cy={RH-22} r="9" fill="none" stroke="var(--leaf)" strokeWidth="0.8" strokeDasharray="1 1.5"/>
        </g>

        {/* North arrow — small, outside top right */}
        <g transform={`translate(${RW+18}, -24)`}>
          <circle cx="0" cy="0" r="14" fill="var(--paper)" stroke="var(--ink)" strokeWidth="0.8"/>
          <polygon points="0,-9 3,3 0,0 -3,3" fill="var(--ink)"/>
          <text x="0" y="-10.5" textAnchor="middle" fontFamily="var(--fm)" fontSize="7" fill="var(--ink)" fontWeight="600">N</text>
        </g>
      </g>

      {/* Title block — bottom right, like a real drawing */}
      <g transform={`translate(${VW-150}, ${VH-44})`}>
        <line x1="0" y1="0" x2="120" y2="0" stroke="var(--ink-3)" strokeWidth="0.5"/>
        <text x="0" y="14" fontFamily="var(--fm)" fontSize="8" fill="var(--ink-3)" letterSpacing="0.12em">PLAN · LIVING ROOM</text>
        <text x="0" y="26" fontFamily="var(--fm)" fontSize="8" fill="var(--ink-3)" letterSpacing="0.12em">SCALE 1:48 · No. 0042-A</text>
      </g>
    </svg>
  );
}

/* ─────────────────────────────────────────────────────────────
   I. COVER
   ───────────────────────────────────────────────────────────── */

function CoverScreen({ onNav }) {
  return (
    <div className="paper" style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
      <TopBar active="cover" onNav={onNav}/>

      {/* Hero */}
      <div style={{ flex:1, display:'grid', gridTemplateColumns:'1.05fr 1fr', minHeight:0 }}>

        {/* Left — editorial type */}
        <div style={{ padding:'0 0 64px 64px', display:'flex', flexDirection:'column', justifyContent:'center', position:'relative' }}>

          <div className="appear" style={{ marginBottom:24 }}>
            <Eyebrow>Folio Nº 01 · A Practice in Indian Interiors</Eyebrow>
          </div>

          <h1 className="appear-2" style={{
            fontFamily:'var(--fd)', fontSize:104, lineHeight:0.96, fontWeight:500,
            letterSpacing:'-0.022em', color:'var(--ink)', marginBottom:18, maxWidth:'14ch',
          }}>
            Drawing your<br/>
            <span style={{ fontStyle:'italic', fontWeight:400, color:'var(--terra)' }}>home,</span> with you.
          </h1>

          <div className="appear-3" style={{ display:'flex', alignItems:'baseline', gap:14, marginBottom:42 }}>
            <span style={{ fontFamily:'var(--fh)', fontSize:24, color:'var(--ink-2)' }}>आपका घर,</span>
            <span style={{ fontFamily:'var(--fd)', fontStyle:'italic', fontSize:24, color:'var(--ink-2)', fontWeight:400 }}>your hand.</span>
          </div>

          <p className="appear-4" style={{ fontSize:16.5, lineHeight:1.7, color:'var(--ink-2)', marginBottom:48, maxWidth:'42ch' }}>
            Nirmit is a drawing practice. You tell us about your flat, your family, and the shape of your evenings. We draw three rooms for you. You pick what to build — and walk away with the plans, the materials, the prices, and a quotation any carpenter can read in Hindi.
          </p>

          <div className="appear-5" style={{ display:'flex', alignItems:'center', gap:36 }}>
            <PrimaryLink onClick={()=>onNav('consult')} big>Begin a consultation</PrimaryLink>
            <span className="eyebrow">No fees · No lock-in · 12 minutes</span>
          </div>

          {/* Drop-cap signature */}
          <div className="appear-5" style={{ position:'absolute', bottom:48, left:64, display:'flex', alignItems:'baseline', gap:18 }}>
            <span style={{ fontFamily:'var(--fd)', fontStyle:'italic', fontSize:14, color:'var(--ink-3)' }}>Drawn this season in</span>
            <span style={{ fontFamily:'var(--fd)', fontSize:15, color:'var(--ink)' }}>Mumbai · Pune · Bangalore · Hyderabad · Chennai · Delhi</span>
          </div>
        </div>

        {/* Right — animated section drawing */}
        <div style={{ padding:'24px 64px 64px 24px', display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
          <CoverSectionDrawing/>
        </div>
      </div>
    </div>
  );
}

/* The animated cross-section sketch on the cover — a simplified Indian living room
   drawn in elevation, with hand-marginalia notes. Self-animating.            */
function CoverSectionDrawing() {
  const W = 580, H = 460;
  return (
    <div style={{ width:'100%', maxWidth:W, position:'relative' }}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ overflow:'visible' }}>
        {/* Floor line */}
        <line x1="20" y1="380" x2={W-20} y2="380" stroke="var(--ink)" strokeWidth="2" className="draw-line"/>

        {/* Wall back */}
        <line x1="40" y1="380" x2="40" y2="60" stroke="var(--ink)" strokeWidth="2" className="draw-line" style={{ animationDelay:'.4s' }}/>

function ConsultScreen({ onNav, brief, setBrief }) {
  const [page, setPage] = useState(0);

  const PAGES = [
    {
      title:'What feeling?',
      hi:'क्या भाव?',
      sub:'Not the style. The feeling.',
      kind:'vibe',
    },
    {
      title:'Which room, how big?',
      hi:'कौन सा कमरा, कितना बड़ा?',
      sub:'A rough sense is enough — we will refine it later.',
      kind:'room',
    },
    {
      title:'Who lives here?',
      hi:'यहाँ कौन रहता है?',
      sub:'Tell us in your own words. The more you say, the more personal the drawing.',
      kind:'who',
    },
    {
      title:'Budget, and where?',
      hi:'बजट, और कहाँ?',
      sub:'For furniture and finishing. Installation is separate.',
      kind:'budget',
    },
  ];

  const validate = () => {
    if (page===0) return !!brief.vibe;
    if (page===1) return !!brief.room && !!brief.size;
    if (page===2) return !!(brief.who && brief.who.trim().length>4);
    if (page===3) return !!brief.city;
    return true;
  };

  const next = () => {
    if (page < PAGES.length-1) setPage(p => p+1);
    else onNav('draft');
  };

  const prev = () => page>0 ? setPage(p=>p-1) : onNav('cover');

  const P = PAGES[page];

  return (
    <div className="paper" style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
      <TopBar active="consult" onNav={onNav}/>

      <div style={{ flex:1, display:'grid', gridTemplateColumns:'1fr 1.4fr', minHeight:0 }}>

        {/* LEFT — Question */}
        <div style={{ padding:'88px 56px 56px', display:'flex', flexDirection:'column', justifyContent:'space-between', borderRight:'1px solid var(--line)' }}>
          <div>
            <div className="appear" style={{ marginBottom:32 }}>
              <Eyebrow>Page {String(page+1).padStart(2,'0')} of 04 · {P.hi}</Eyebrow>
            </div>
            <h2 key={`q${page}`} className="slide-up" style={{
              fontFamily:'var(--fd)', fontSize:64, fontWeight:500, lineHeight:1.0,
              letterSpacing:'-0.018em', marginBottom:14,
            }}>
              {P.title.split(',').map((part,i,arr) => (
                <Fragment key={i}>{i>0 && ', '}<span style={i===arr.length-1?{fontStyle:'italic', fontWeight:400, color:'var(--terra)'}:undefined}>{part}</span></Fragment>
              ))}
            </h2>
            <div className="slide-up" style={{ animationDelay:'.1s', fontFamily:'var(--fd)', fontStyle:'italic', fontSize:18, color:'var(--ink-2)', maxWidth:'34ch' }}>{P.sub}</div>
          </div>

          {/* Trail */}
          <div className="appear-3" style={{ display:'flex', flexDirection:'column', gap:9, marginTop:42 }}>
            <Eyebrow>So far</Eyebrow>
            <ConsultTrail brief={brief} page={page}/>
          </div>
        </div>

        {/* RIGHT — Answer surface */}
        <div style={{ padding:'72px 80px 40px', display:'flex', flexDirection:'column', minHeight:0, overflow:'hidden' }}>
          <div key={`a${page}`} style={{ flex:1, minHeight:0, animation:'slideUp .55s cubic-bezier(.22,.7,0,1.05) both', animationDelay:'.15s' }}>
            {P.kind==='vibe'    && <VibeAnswer    brief={brief} setBrief={setBrief}/>}
            {P.kind==='room'    && <RoomAnswer    brief={brief} setBrief={setBrief}/>}
            {P.kind==='who'     && <WhoAnswer     brief={brief} setBrief={setBrief}/>}
            {P.kind==='budget'  && <BudgetAnswer  brief={brief} setBrief={setBrief}/>}
          </div>

          <div className="appear-4" style={{ display:'flex', justifyContent:'space-between', alignItems:'center', borderTop:'1px solid var(--line)', paddingTop:28, marginTop:24 }}>
            <a className="lnk" onClick={prev} style={{ fontFamily:'var(--fd)', fontStyle:'italic', fontSize:15, borderColor:'transparent', color:'var(--ink-3)' }}>
              <span style={{ display:'inline-block', transform:'scaleX(-1)' }}>→</span> {page===0?'Back to cover':'Previous'}
            </a>
            <PrimaryLink onClick={validate() ? next : undefined}>
              <span style={{ opacity: validate()?1:.32, transition:'opacity .25s' }}>
                {page<3 ? 'Continue' : 'Begin drafting'}
              </span>
            </PrimaryLink>
          </div>
        </div>
      </div>
    </div>
  );
}

function ConsultTrail({ brief, page }) {
  const items = [
    { i:0, label:'Feeling',    val: brief.vibe ? VIBES.find(v=>v.id===brief.vibe).name : null },
    { i:1, label:'Room',       val: brief.room ? `${ROOMS.find(r=>r[0]===brief.room)[1]} · ${(SIZES.find(s=>s.id===brief.size)||{}).en||''}` : null },
    { i:2, label:'Lives here', val: brief.who ? truncate(brief.who, 40) : null },
    { i:3, label:'Budget',     val: brief.city ? `${formatBudget(brief.budget)} · ${brief.city}` : null },
  ];
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
      {items.map(it => (
        <div key={it.i} style={{ display:'flex', alignItems:'baseline', gap:12, opacity: it.val ? 1 : .35 }}>
          <span className="eyebrow" style={{ minWidth:80, fontSize:9.5 }}>{it.label}</span>
          <span style={{ fontFamily:'var(--fd)', fontStyle:'italic', fontSize:15, color: it.i===page ? 'var(--terra-dk)' : 'var(--ink)' }}>
            {it.val || (it.i===page ? '…' : '—')}
          </span>
        </div>
      ))}
    </div>
  );
}

function truncate(s, n) { return s.length>n ? s.slice(0, n-1)+'…' : s; }
function formatBudget(v) {
  if (v >= 500000) return '₹5L+';
  if (v >= 100000) return `₹${(v/100000).toFixed(1).replace('.0','')}L`;
  return `₹${(v/1000).toFixed(0)}K`;
}

function WhoAnswer({ brief, setBrief }) {
  const [chips] = useState([

  ]);
  const toggleChip = c => {
    const arr = brief.chips || [];
    setBrief({ ...brief, chips: arr.includes(c) ? arr.filter(x=>x!==c) : [...arr, c] });
  };
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', gap:32 }}>
      <div style={{ position:'relative' }}>
        <textarea
          value={brief.who||''}
          onChange={e=>setBrief({...brief, who:e.target.value})}
          placeholder="A family of four — my son is four years old. My mother-in-law visits often and stays in this room sometimes. We watch movies together. I work some evenings. We accumulate a lot of toys."

            width:'100%', height:200, border:'none', borderBottom:'1px solid var(--line)',

          {chips.map(c => {

    </div>
  );
}

function DraftScreen({ onNav }) {
  const [stage, setStage] = useState(0);
  const doneRef = useRef(false);

  useEffect(() => {
    let s = 0;
    const iv = setInterval(() => {
      s++;
      if (s >= DRAFT_STAGES.length+1) {
        clearInterval(iv);
        if (!doneRef.current) {
          doneRef.current = true;
          setTimeout(() => onNav('reveal'), 1400);
        }
      }
      setStage(s);
    }, 2200);
    return () => clearInterval(iv);
  }, [onNav]);

  const visibleNotes = DRAFT_NOTES.filter(n => n.stage <= stage);

  return (
    <div className="paper" style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
      <TopBar active="draft" onNav={onNav}/>

            </div>
            <div style={{ fontFamily:'var(--fh)', fontSize:16, color:'var(--ink-3)', marginTop:8 }}>

          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>

              const current = stage === i+1;
              return (
                <div key={i} style={{ display:'flex', alignItems:'baseline', gap:14 }}>
                  <span style={{ fontFamily:'var(--fm)', fontSize:10, color: done?'var(--terra)':current?'var(--ink)':'var(--ink-3)', minWidth:24 }}>
                    {String(i+1).padStart(2,'0')}
                  </span>
                  <div style={{ flex:1, height:1, background: done?'var(--terra)':current?'var(--ink-2)':'var(--line)', marginRight:12, transition:'background .4s' }}/>

                    {s.en}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

          </div>

          {/* Suggestions */}
          <div style={{ padding:'8px 24px 4px', display:'flex', flexWrap:'wrap', gap:6 }}>

                padding:'7px 14px', fontFamily:'var(--fd)', fontStyle:'italic', fontSize:12.5,

              }}
              onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--terra)'; e.currentTarget.style.color='var(--terra-dk)'; }}
              onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--line)'; e.currentTarget.style.color='var(--ink-2)'; }}

          {/* Input */}
          <div style={{ padding:'14px 24px 22px', display:'flex', alignItems:'center', gap:0, borderTop:'1px solid var(--line)' }}>

function App() {

  }, []);

  return (
    <div data-screen-label={`0${{cover:1,consult:2,draft:3,reveal:4,studio:5,handoff:6}[screen]} ${{cover:'Cover',consult:'Consultation',draft:'Drafting',reveal:'Reveal',studio:'Studio',handoff:'Handoff'}[screen]}`} style={{ position:'fixed', inset:0, overflow:'hidden' }}>

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
