<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nirmit — See Your Home, Before It Exists</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --bg:       #FEFCF8;
  --bg-warm:  #F5EFE6;
  --surface:  #FFFFFF;
  --text:     #251D18;
  --text-2:   #7A6A5E;
  --text-3:   #B8A99A;
  --gold:     #C4965A;
  --gold-lt:  #EAD9BC;
  --gold-dk:  #9A6E3A;
  --border:   #E8DDD4;
  --fd: 'Cormorant Garamond', Georgia, serif;
  --fb: 'DM Sans', system-ui, sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: var(--fb); color: var(--text); -webkit-font-smoothing: antialiased; }
input, textarea, button, select { font-family: var(--fb); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-lt); border-radius: 3px; }
input[type=range] {
  -webkit-appearance: none; width: 100%; height: 3px;
  border-radius: 2px; background: var(--border); outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
  background: var(--gold); cursor: pointer; box-shadow: 0 2px 8px rgba(196,150,90,0.25);
}

@keyframes appear { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes drawIn { from { stroke-dashoffset: 1200; } to { stroke-dashoffset: 0; } }
@keyframes fadeOnly { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes spinR { to { transform: rotate(-360deg); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }

.appear    { animation: appear   .48s cubic-bezier(.22,.68,0,1.1) both; }
.appear-2  { animation: appear   .48s cubic-bezier(.22,.68,0,1.1) .12s both; }
.appear-3  { animation: appear   .48s cubic-bezier(.22,.68,0,1.1) .22s both; }
.appear-4  { animation: appear   .48s cubic-bezier(.22,.68,0,1.1) .32s both; }
.fade-only { animation: fadeOnly .38s ease both; }
.scale-in  { animation: scaleIn  .42s cubic-bezier(.22,.68,0,1.1) both; }
.draw-wall { stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: drawIn 2s ease forwards; }
.fade-furniture { opacity: 0; animation: fadeOnly .6s ease 1.8s forwards; }
.fade-color     { opacity: 0; animation: fadeOnly .8s ease 2.4s forwards; }
.fade-vastu     { opacity: 0; animation: fadeOnly .5s ease 3s forwards; }
.pulse-anim     { animation: pulse 2.2s ease infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Data ─────────────────────────────────────── */

const VIBES = [
  { id:'warm-family',      label:'The Gathering',    desc:'Warm · Dense · Lived-in',       bg:'linear-gradient(140deg,#C4682A,#8B3A10)', fg:'#FFF0E0' },
  { id:'open-breath',      label:'The Breath',       desc:'Airy · Minimal · Peaceful',     bg:'linear-gradient(140deg,#E8EFF5,#B8D0E2)', fg:'#2A4060' },
  { id:'heritage-rich',    label:'The Keeper',       desc:'Heritage · Crafted · Deep',     bg:'linear-gradient(140deg,#3A2115,#6B3A1E)', fg:'#F0C880' },
  { id:'coastal-ease',     label:'Coastal Ease',     desc:'Natural · Breezy · Light',      bg:'linear-gradient(140deg,#5A9FAC,#B4CAC0)', fg:'#F8FAFA' },
  { id:'bold-color',       label:'The Statement',    desc:'Jewel tones · Pattern · Personality', bg:'linear-gradient(140deg,#2B3B8C,#7A2050)', fg:'#FFD080' },
  { id:'urban-precision',  label:'Urban Precision',  desc:'Clean lines · Quality-led',     bg:'linear-gradient(140deg,#383840,#5C5C68)', fg:'#D8D8DC' },
];

const ROOM_TYPES = ['Living Room','Bedroom','Kitchen','Dining Room','Study'];
const CITIES     = ['Mumbai','Pune','Bangalore','Delhi','Hyderabad','Chennai','Kolkata'];
const WHO_CHIPS  = ['Young kids','Elderly parent','Work from home','Frequent guests','Pets','Couple'];

const GEN_STAGES = [
  { label:'Reading your room…',           note:'Keeping northeast corner open for prayer' },
  { label:'Placing your furniture…',      note:'Planning open centre for the little ones' },
  { label:'Applying your style…',         note:'Choosing marine ply for Mumbai humidity' },
  { label:'Checking Vastu alignment…',    note:'Maximising storage along the east wall' },
  { label:'Your room is almost ready…',   note:'Calculating real-time material costs' },
];

const VISIONS = [
  {
    name:'The Gathering', cost:'₹2,84,000',
    philosophy:'Built for your family\'s evenings together.',
    insight:'Mandir in northeast — morning light for your mother-in-law. Open centre for the little ones. Oversized sofa for those movie nights.',
    why:[
      'Mandir in the northeast corner, facing east — because Vastu matters to your family.',
      'Open centre floor — your four-year-old needs room to play.',
      'Oversized 3-seater sofa — movie nights deserve it.',
      'Closed storage behind every panel — real homes have real stuff.',
      'WFH desk in the southeast, light from the window, out of the main sightline.',
    ],
  },
  {
    name:'The Breath', cost:'₹2,41,000',
    philosophy:'Open and minimal — made for peace.',
    insight:'Lower furniture count, open centre. The room feels twice as large. Still holds everything you need.',
    why:[
      'Open centre and minimal density — creates a rare sense of calm in a Mumbai flat.',
      'Wall-mounted storage everywhere — no footprint, maximum function.',
      'Lighter material palette — reflects more light throughout the day.',
      'Mandir in a backlit niche — subtle, intentional, beautiful.',
      'Fewer pieces, better quality — budget focused on what actually matters.',
    ],
  },
  {
    name:'The Keeper', cost:'₹2,96,000',
    philosophy:'Storage-first — nothing wasted.',
    insight:'Maximum storage on every wall. A place for everything. The room can absorb years of living without showing it.',
    why:[
      'Floor-to-ceiling units on all available walls — maximum storage per square foot.',
      'Every cabinet is closed — visual clutter simply disappears.',
      'Deep sofa with under-seat hydraulic storage — doubles its purpose.',
      'Dedicated toy corner — things have homes, nothing is lost.',
      'Modular units — rearrange as the family grows.',
    ],
  },
];

const CHAT_INIT = [
  { role:'ai', text:'Welcome to your living room. I\'ve designed it around everything you told me — the mandir faces northeast for morning light, the centre is open for the little ones, and the sofa is oversized for those movie nights. Take a look around.' },
  { role:'user', text:'Make the sofa bigger. Dark leather.' },
  { role:'ai', text:'Done — I\'ve gone with a 3-seater instead of 2-seater. It fits without blocking the walkway. Dark leather in PU at ₹38,000 instead of ₹22,000. That\'s +₹16,000 but worth it for how much this sofa will be used. Total is now ₹2,63,000 — ₹37,000 under budget.' },
];

/* ── Shared UI ─────────────────────────────────── */

function Logo({ size='md' }) {
  const fs = { sm:16, md:20, lg:28 }[size];
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:1, userSelect:'none' }}>
      <span style={{ fontFamily:'var(--fd)', fontSize:fs, fontWeight:600, letterSpacing:'0.18em', color:'var(--text)', textTransform:'uppercase' }}>Nirmit</span>
      <span style={{ fontSize:fs*.45, color:'var(--text-3)', letterSpacing:'0.06em' }}>निर्मित</span>
    </div>
  );
}

function Btn({ children, onClick, variant='primary', disabled, full, style:s={} }) {
  const base = { border:'none', cursor:disabled?'default':'pointer', fontFamily:'var(--fb)', fontWeight:500, letterSpacing:'0.01em', transition:'all .2s ease', display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6, opacity:disabled?.38:1, width:full?'100%':undefined };
  const V = {
    primary:{ background:'var(--gold)', color:'white', padding:'13px 32px', borderRadius:9, fontSize:15, boxShadow:'0 2px 14px rgba(196,150,90,.22)' },
    ghost:  { background:'transparent', color:'var(--text-2)', padding:'10px 18px', borderRadius:8, fontSize:14 },
    outline:{ background:'transparent', color:'var(--gold)', border:'1.5px solid var(--gold)', padding:'11px 26px', borderRadius:8, fontSize:14 },
    dark:   { background:'var(--text)', color:'white', padding:'13px 32px', borderRadius:9, fontSize:15 },
  };
  return <button onClick={disabled?undefined:onClick} style={{...base,...V[variant],...s}}>{children}</button>;
}

function Tag({ children }) {
  return <span style={{ fontSize:10, fontWeight:600, background:'var(--gold-lt)', color:'var(--gold-dk)', padding:'2px 9px', borderRadius:100, letterSpacing:'0.04em' }}>{children}</span>;
}

/* ── Landing Screen ─────────────────────────────── */

function LandingScreen({ onStart }) {
  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column', background:'var(--bg)' }}>
      {/* Nav */}
      <div style={{ padding:'28px 56px', flexShrink:0 }} className="appear">
        <Logo />
      </div>

      {/* Hero */}
      <div style={{ flex:1, display:'flex', alignItems:'stretch', padding:'0 56px 64px', gap:64, minHeight:0 }}>

        {/* Left */}
        <div style={{ flex:'0 0 50%', display:'flex', flexDirection:'column', justifyContent:'center', paddingRight:16 }}>
          <div className="appear" style={{ fontFamily:'var(--fd)', fontSize:68, lineHeight:1.06, fontWeight:600, letterSpacing:'-0.01em', marginBottom:28 }}>
            See your home,<br />
            <em style={{ fontWeight:400, color:'var(--gold)', fontStyle:'italic' }}>before it exists.</em>
          </div>
          <div className="appear-2" style={{ fontSize:17, lineHeight:1.75, color:'var(--text-2)', marginBottom:52, maxWidth:460 }}>
            Answer a few questions about your life and your space. We design your room in minutes — complete, furnished, priced — and give you everything to build it. No sales calls. No lock-in.
          </div>
          <div className="appear-3" style={{ display:'flex', alignItems:'center', gap:20 }}>
            <Btn onClick={onStart} style={{ padding:'16px 44px', fontSize:17 }}>Design My Room</Btn>
            <span style={{ fontSize:13, color:'var(--text-3)' }}>Free to use · No account needed</span>
          </div>

          {/* Trust strip */}
          <div className="appear-4" style={{ marginTop:56, display:'flex', gap:32, alignItems:'center' }}>
            {['Mumbai','Bangalore','Delhi','Chennai','Hyderabad'].map(c => (
              <span key={c} style={{ fontSize:12, color:'var(--text-3)', fontWeight:500 }}>{c}</span>
            ))}
          </div>
        </div>

        {/* Right — hero image placeholder */}
        <div className="scale-in" style={{ flex:1, borderRadius:20, overflow:'hidden', position:'relative', background:'var(--bg-warm)', boxShadow:'0 24px 60px rgba(37,29,24,.1)' }}>
          <svg width="100%" height="100%" style={{ position:'absolute', inset:0 }}>
            <defs>
              <pattern id="heroStripe" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
                <rect width="44" height="44" fill="#F2EBE0"/>
                <rect width="1.2" height="44" fill="#E8DDD4"/>
              </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#heroStripe)"/>
          </svg>
          <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <div style={{ textAlign:'center', fontFamily:'monospace', fontSize:12, color:'var(--text-3)', lineHeight:1.7 }}>
              hero photo<br />Indian living room<br />warm golden hour<br />high quality
            </div>
          </div>
          {/* Caption */}
          <div style={{ position:'absolute', bottom:0, left:0, right:0, background:'linear-gradient(transparent,rgba(37,29,24,.65))', padding:'60px 32px 30px' }}>
            <div style={{ fontFamily:'var(--fd)', fontSize:22, fontWeight:500, color:'white', marginBottom:5 }}>The Gathering</div>
            <div style={{ fontSize:13, color:'rgba(255,255,255,.72)' }}>Living Room · 12×14 ft · Mumbai · ₹2,84,000</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Intake Screen ──────────────────────────────── */

function IntakeScreen({ onComplete }) {
  const [step, setStep] = useState(0);
  const [vibe, setVibe] = useState(null);
  const [roomType, setRoomType] = useState(null);
  const [roomSize, setRoomSize] = useState(null);
  const [whoText, setWhoText] = useState('');
  const [chips, setChips] = useState([]);
  const [budget, setBudget] = useState(300000);
  const [city, setCity] = useState(null);

  const toggleChip = c => setChips(p => p.includes(c) ? p.filter(x=>x!==c) : [...p,c]);

  const formatBudget = v => v>=500000 ? '₹5,00,000+' : v>=100000 ? `₹${(v/100000).toFixed(1).replace('.0','')} Lakh` : `₹${(v/1000).toFixed(0)}K`;

  const canGo = [!!vibe, !!(roomType&&roomSize), !!(whoText.trim()||chips.length), !!(city)][step];

  const trail = [vibe?.label, roomType, (whoText||chips.length) && (whoText.split(' ').slice(0,4).join(' ')+'…' || chips.slice(0,2).join(', '))].filter(Boolean);

  const next = () => step<3 ? setStep(step+1) : onComplete({ vibe, roomType, roomSize, who:whoText, chips, budget, city });

  const roomSizes = [
    { id:'compact',  label:'Compact',  sub:'≤10×10 ft',  w:38, h:38 },
    { id:'standard', label:'Standard', sub:'10×14 ft',    w:44, h:62 },
    { id:'large',    label:'Large',    sub:'16×18 ft',    w:60, h:68 },
    { id:'open',     label:'Open',     sub:'18+ ft',      w:74, h:74 },
  ];

  const prog = ((step + (canGo?1:0)) / 4) * 100;

  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column', background:'var(--bg)' }}>
      {/* Header */}
      <div style={{ padding:'22px 56px', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0 }}>
        <Logo size="sm" />
        {trail.length>0 && (
          <div style={{ display:'flex', gap:10, alignItems:'center', fontSize:13, color:'var(--text-3)' }}>
            {trail.map((t,i) => (
              <React.Fragment key={i}>
                {i>0 && <span style={{ opacity:.4 }}>·</span>}
                <span style={{ color:'var(--text-2)', fontWeight:500 }}>{t}</span>
              </React.Fragment>
            ))}
          </div>
        )}
      </div>

      {/* Progress line */}
      <div style={{ height:2, background:'var(--border)', flexShrink:0 }}>
        <div style={{ height:2, background:'var(--gold)', width:`${prog}%`, transition:'width .5s ease', borderRadius:1 }}/>
      </div>

      {/* Content */}
      <div style={{ flex:1, overflowY:'auto', padding:'52px 56px 16px' }}>

        {step===0 && (
          <div key="q1" className="appear">
            <div style={{ fontFamily:'var(--fd)', fontSize:42, fontWeight:500, lineHeight:1.15, marginBottom:8 }}>What do you want this room to feel like?</div>
            <div style={{ fontSize:14, color:'var(--text-3)', marginBottom:44 }}>Choose the feeling, not the style. We'll handle the rest.</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:18 }}>
              {VIBES.map(v => (
                <div key={v.id} onClick={()=>setVibe(v)} style={{
                  borderRadius:14, overflow:'hidden', cursor:'pointer',
                  border: vibe?.id===v.id ? '2.5px solid var(--gold)' : '2px solid transparent',
                  boxShadow: vibe?.id===v.id ? '0 0 0 4px rgba(196,150,90,.14)' : '0 1px 10px rgba(37,29,24,.08)',
                  transition:'all .2s ease', background:'white',
                }}>
                  <div style={{ height:130, background:v.bg, display:'flex', alignItems:'flex-end', padding:'0 14px 14px' }}>
                    {vibe?.id===v.id && (
                      <div style={{ width:22, height:22, borderRadius:'50%', background:'var(--gold)', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 2px 6px rgba(0,0,0,.2)' }}>
                        <svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l2.5 2.5L9 1" stroke="white" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </div>
                    )}
                  </div>
                  <div style={{ padding:'13px 16px 16px' }}>
                    <div style={{ fontFamily:'var(--fd)', fontSize:18, fontWeight:600, marginBottom:3 }}>{v.label}</div>
                    <div style={{ fontSize:12, color:'var(--text-3)' }}>{v.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {step===1 && (
          <div key="q2" className="appear">
            <div style={{ fontFamily:'var(--fd)', fontSize:42, fontWeight:500, lineHeight:1.15, marginBottom:8 }}>Which room, and roughly how big?</div>
            <div style={{ fontSize:14, color:'var(--text-3)', marginBottom:44 }}>Not sure? Pick the closest — you can adjust later in the planner.</div>

            <div style={{ marginBottom:40 }}>
              <div style={{ fontSize:11, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:14 }}>Room Type</div>
              <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
                {ROOM_TYPES.map(r => (
                  <div key={r} onClick={()=>setRoomType(r)} style={{
                    padding:'11px 22px', borderRadius:100, cursor:'pointer', fontSize:14, fontWeight:500, transition:'all .18s ease',
                    background: roomType===r ? 'var(--gold)' : 'white',
                    color:       roomType===r ? 'white' : 'var(--text-2)',
                    border:      roomType===r ? '1.5px solid var(--gold)' : '1.5px solid var(--border)',
                  }}>{r}</div>
                ))}
              </div>
            </div>

            <div>
              <div style={{ fontSize:11, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:14 }}>Room Size</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14 }}>
                {roomSizes.map(rs => (
                  <div key={rs.id} onClick={()=>setRoomSize(rs.id)} style={{
                    borderRadius:12, padding:'20px 14px 18px', cursor:'pointer', textAlign:'center', transition:'all .18s ease',
                    background: roomSize===rs.id ? '#FFF8EC' : 'white',
                    border: roomSize===rs.id ? '2px solid var(--gold)' : '2px solid var(--border)',
                  }}>
                    <div style={{ display:'flex', justifyContent:'center', marginBottom:12 }}>
                      <div style={{ width:rs.w, height:rs.h, border:`2px solid ${roomSize===rs.id?'var(--gold)':'var(--text-3)'}`, borderRadius:3, transition:'border-color .18s' }}/>
                    </div>
                    <div style={{ fontSize:14, fontWeight:600, color:'var(--text)', marginBottom:3 }}>{rs.label}</div>
                    <div style={{ fontSize:11, color:'var(--text-3)' }}>{rs.sub}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {step===2 && (
          <div key="q3" className="appear">
            <div style={{ fontFamily:'var(--fd)', fontSize:42, fontWeight:500, lineHeight:1.15, marginBottom:8 }}>Tell me about who this room is for.</div>
            <div style={{ fontSize:14, color:'var(--text-3)', marginBottom:44 }}>The more you share, the more personal your design will be.</div>
            <textarea value={whoText} onChange={e=>setWhoText(e.target.value)}
              placeholder="e.g. Family with two kids and my mother-in-law who visits often. We need space for prayer and movie nights."
              style={{
                width:'100%', minHeight:150, border:'1.5px solid var(--border)', borderRadius:12,
                padding:'18px 20px', fontSize:16, lineHeight:1.7, fontFamily:'var(--fb)',
                color:'var(--text)', background:'white', resize:'none', outline:'none', transition:'border-color .2s',
              }}
              onFocus={e=>e.target.style.borderColor='var(--gold)'}
              onBlur={e=>e.target.style.borderColor='var(--border)'}
            />
            <div style={{ marginTop:20, display:'flex', gap:8, flexWrap:'wrap' }}>
              {WHO_CHIPS.map(c => (
                <div key={c} onClick={()=>toggleChip(c)} style={{
                  padding:'8px 18px', borderRadius:100, fontSize:13, cursor:'pointer', fontWeight:500, transition:'all .15s ease',
                  background: chips.includes(c) ? 'var(--gold-lt)' : 'white',
                  color:       chips.includes(c) ? 'var(--gold-dk)' : 'var(--text-2)',
                  border: `1.5px solid ${chips.includes(c)?'var(--gold)':'var(--border)'}`,
                }}>+ {c}</div>
              ))}
            </div>
          </div>
        )}

        {step===3 && (
          <div key="q4" className="appear">
            <div style={{ fontFamily:'var(--fd)', fontSize:42, fontWeight:500, lineHeight:1.15, marginBottom:8 }}>Budget and where are you?</div>
            <div style={{ fontSize:14, color:'var(--text-3)', marginBottom:44 }}>This covers furniture and finishing. Installation is extra.</div>

            <div style={{ marginBottom:52, maxWidth:640 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:12 }}>
                <div style={{ fontSize:11, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em' }}>Budget</div>
                <div style={{ fontFamily:'var(--fd)', fontSize:36, fontWeight:600, color:'var(--gold)' }}>{formatBudget(budget)}</div>
              </div>
              <input type="range" min="75000" max="500000" step="25000" value={budget} onChange={e=>setBudget(+e.target.value)} />
              <div style={{ display:'flex', justifyContent:'space-between', marginTop:10, fontSize:11, color:'var(--text-3)' }}>
                <span>Essentials · ₹75K</span>
                <span>Family · ₹1.5L</span>
                <span>Complete · ₹3L</span>
                <span>Premium · ₹5L+</span>
              </div>
            </div>

            <div>
              <div style={{ fontSize:11, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:14 }}>City</div>
              <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
                {CITIES.map(c => (
                  <div key={c} onClick={()=>setCity(c)} style={{
                    padding:'11px 22px', borderRadius:100, cursor:'pointer', fontSize:14, fontWeight:500, transition:'all .18s ease',
                    background: city===c ? 'var(--gold)' : 'white',
                    color:       city===c ? 'white' : 'var(--text-2)',

    </div>

}

/* ── AI Chat Panel ──────────────────────────────── */

function AIChat() {
  const [msgs, setMsgs] = useState(CHAT_INIT);
  const [input, setInput] = useState('');
  const [thinking, setThinking] = useState(false);
  const containerRef = useRef(null);

  useEffect(() => {
    if (containerRef.current) containerRef.current.scrollTop = containerRef.current.scrollHeight;
  }, [msgs, thinking]);

  const send = () => {
    if (!input.trim()) return;
    const q = input;
    setInput('');
    setMsgs(p => [...p, { role:'user', text:q }]);
    setThinking(true);
    setTimeout(() => {
      setThinking(false);
      setMsgs(p => [...p, { role:'ai', text:`I've noted that — "${q}". Give me a moment to work it into the layout and update the cost.` }]);
    }, 1100);
  };

  const SUGGESTIONS = ['Bigger sofa','Dark leather','More storage','What\'s my total?','Add a bookshelf'];

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      {/* Messages */}
      <div ref={containerRef} style={{ flex:1, overflowY:'auto', padding:'20px', display:'flex', flexDirection:'column', gap:14 }}>
        {msgs.map((m,i) => (
          <div key={i} className="fade-only" style={{ display:'flex', justifyContent:m.role==='user'?'flex-end':'flex-start', alignItems:'flex-end', gap:8 }}>
            {m.role==='ai' && (
              <div style={{ width:26, height:26, borderRadius:'50%', background:'var(--gold)', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:2 }}>
                <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="none" stroke="white" strokeWidth="1.5"/><circle cx="5" cy="5" r="1.8" fill="white"/></svg>
              </div>
            )}
            <div style={{
              maxWidth:'80%', padding:'11px 15px', fontSize:13, lineHeight:1.65,
              borderRadius: m.role==='user' ? '14px 14px 4px 14px' : '4px 14px 14px 14px',
              background: m.role==='user' ? 'var(--gold)' : 'white',
              color:       m.role==='user' ? 'white' : 'var(--text)',
              border: m.role==='ai' ? '1px solid var(--border)' : 'none',
              boxShadow: '0 1px 5px rgba(37,29,24,.06)',
            }}>{m.text}</div>
          </div>
        ))}
        {thinking && (
          <div style={{ display:'flex', alignItems:'flex-end', gap:8 }}>
            <div style={{ width:26, height:26, borderRadius:'50%', background:'var(--gold)', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="none" stroke="white" strokeWidth="1.5"/><circle cx="5" cy="5" r="1.8" fill="white"/></svg>
            </div>
            <div style={{ padding:'11px 15px', borderRadius:'4px 14px 14px 14px', background:'white', border:'1px solid var(--border)', display:'flex', gap:5, alignItems:'center' }}>
              {[0,1,2].map(i=><div key={i} style={{ width:6, height:6, borderRadius:'50%', background:'var(--text-3)', animation:`pulse 1.2s ease ${i*.2}s infinite` }}/>)}
            </div>
          </div>
        )}
      </div>

      {/* Suggestions */}
      <div style={{ padding:'0 16px 10px', display:'flex', gap:7, flexWrap:'wrap' }}>
        {SUGGESTIONS.map(s=>(
          <div key={s} onClick={()=>setInput(s)} style={{ padding:'6px 13px', borderRadius:100, border:'1px solid var(--border)', fontSize:12, color:'var(--text-2)', cursor:'pointer', background:'white', transition:'all .14s ease', whiteSpace:'nowrap' }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--gold)'; e.currentTarget.style.color='var(--gold-dk)'; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--text-2)'; }}
          >{s}</div>
        ))}
      </div>

      {/* Input */}
      <div style={{ padding:'10px 16px 18px', borderTop:'1px solid var(--border)', display:'flex', gap:8 }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
          placeholder="Tell me what you'd like to change…"
          style={{ flex:1, border:'1.5px solid var(--border)', borderRadius:10, padding:'11px 14px', fontSize:13, fontFamily:'var(--fb)', outline:'none', background:'white', color:'var(--text)', transition:'border-color .2s' }}
          onFocus={e=>e.target.style.borderColor='var(--gold)'}
          onBlur={e=>e.target.style.borderColor='var(--border)'}
        />
        <button onClick={send} style={{ background:'var(--gold)', color:'white', border:'none', padding:'11px 18px', borderRadius:10, cursor:'pointer', fontSize:16, fontWeight:700, transition:'opacity .2s' }}>↑</button>
      </div>
    </div>
  );
}

                  onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--text-2)'; }}

              ))}

          )}
        </div>

        {/* Right: AI panel */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', background:'white' }}>
          <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
            <div style={{ fontSize:11, fontWeight:600, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:'0.08em' }}>Design Collaborator</div>
          </div>
          <div style={{ flex:1, overflow:'hidden' }}>
            <AIChat/>
          </div>
        </div>
      </div>

      {/* Edit manually link */}
      <div onClick={()=>setEditMode(!editMode)} style={{ position:'absolute', bottom:12, left:'31%', transform:'translateX(-50%)', fontSize:12, color:'var(--text-3)', cursor:'pointer', textDecoration:'underline', textUnderlineOffset:3 }}>
        {editMode ? 'Exit edit mode' : '✎ Edit manually'}
      </div>
    </div>
  );
}

/* ── App ────────────────────────────────────────── */

function App() {
  const [screen, setScreen] = useState('landing');

  const go = s => setScreen(s);

  const SCREENS = {
    landing:    <LandingScreen    onStart={()=>go('intake')}                                          />,
    intake:     <IntakeScreen     onComplete={()=>go('generating')}                                   />,
    generating: <GeneratingScreen onDone={()=>go('visions')}                                          />,
    visions:    <VisionsScreen    onSelect={()=>go('planner')}                                        />,
    planner:    <PlannerScreen    onExport={()=>go('export')}                                         />,
    export:     <ExportScreen     onBack={()=>go('planner')}                                          />,
  };

  return (
    <div key={screen} style={{ position:'fixed', inset:0, overflow:'hidden' }}>
      {SCREENS[screen]}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
